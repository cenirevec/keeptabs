<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepTabs</title>
</head>
<body>

    <link rel="stylesheet" type="text/css" href="./lib/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="./media/main.css">

        
    <div id="content">
        <header>
            <img src="./media/ico-48.png">
                <h1>KeepTabs</h1>
            <small id="manifest-version" class="text text-secondary">version 0.0.12-dev</small>
        </header>
        
            <div class="container">
                <section class="row">
                    <div id="current">
                        <h2>Current Tabs <span class="badge badge-secondary">number</span></h2>
                        <ul class="list-group tabs">

                        </ul>
                        <button class="btn btn-primary" id="saveCurrent">Save</button>
                        <button class="btn btn-secondary" id="saveCurrentIn">Save in... </button>
                        <!--This button transforms itself in search box helped by the list of already created item and save when Enter pressed-->
                    </div>
                    <div>
                        <hr> 
                        <!--<button class="btn btn-secondary" id="refreshAll">Refresh</button> -->
                        <button class="btn btn-danger" id="dropAll">Clear</button>
                        <i class="text-secondary">Development mode</i>
                        <hr>
                    </div>
                </section>
                <section id="searchbox">
                    
                </section>
                <section id="loaded">
                    <div id="wrapper">
                        <div id="main">
                            <h2>Loading saved tabs</h2>
                            <ul class="list-group tabs">
                                Loading...
                            </ul>
                        </div>
                    </div>
                </section>
            </div>
            <footer class="text text-secondary">Settings - KeepTabs is an <a href="https://github.com/cenirevec/keeptabs">Open Source project (Licence: Apache)</a> <button class="btn btn-success">Donate</button></footer>
    </div>
    <!---
    <script type="modules" src="./script/backend.js"></script>
    <script type="modules" src="./script/frontend.js"></script>
    --->
    <script type="module" src="main.js"></script>
    
</body>
</html>
