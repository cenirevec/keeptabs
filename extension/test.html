<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepTabs</title>

    <!--
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' 'unsafe-eval';">
    -->
</head>
<body>


    <!-- CSS Style sheet-->
    <!--
    <link rel="stylesheet" type="text/css" href="./media/elements.css">
    <link rel="stylesheet" type="text/css" href="./media/layout.css">
    -->
    <link rel="stylesheet" type="text/css" href="./lib/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="./media/main.css">

        
    <div id="content">
        <header>
            <img src="./media/ico-48.png">
                <h1>KeepTabs</h1>
            <small class="text text-secondary">Development version 0.0.12</small>
        </header>
        
            
            <div class="container">
                <section class="row">
                    <div id="current">
                        <h2>Current Tabs <span class="badge badge-secondary">number</span></h2>
                        <ul class="list-group tabs">

                        </ul>
                        <button class="btn btn-primary" id="saveCurrent">Save</button>
                        <button class="btn btn-secondary" id="saveCurrent">Save in... </button>
                        This button transforms itself in search box helped by the list of already created item and save when Enter pressed
                    </div>
                    <div>
                        <p>Development mode</p>
                        <button class="btn btn-secondary" id="refreshAll">Refresh</button>
                        <button class="btn btn-danger" id="dropAll">Clear</button>
                    </div>
                </section>
                <section id="loaded">
                    <div id="wrapper">
                        <div id="main">
                            <h2>Main</h2>
                            <ul class="list-group tabs">
                                content here
                            </ul>
                        </div>
                    </div>
                </section>

            </div>
            <footer class="text text-secondary">Settings - KeepTabs is an Open Source project (Licence: Apache)</footer>
    </div>
    
</body>
</html>
