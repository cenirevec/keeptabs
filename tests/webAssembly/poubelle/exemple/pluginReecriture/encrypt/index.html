<!DOCTYPE html>
<html>
  <head>
    <script type="text/javascript" src="cipher.js"></script>
  </head>
  
<body>

  <h2>Encrypt Section</h2>
<form id="frm1">
  Input Text: <input type="text" name="fname" placeholder="Your input txt..."><br>
  Encryption Key : <input type="number" name="key" min="1" max="127" placeholder="4">
  <br><br>
</form> 


<p>Click "Encrypt" to encrypt your Message.</p>

<button onclick="myFunction()">Encrypt</button>

  <p id="demo"></p>

  
<script>
  function myFunction() {
  var x = document.getElementById("frm1");
  var text = "";
  encrypt= Module.cwrap('encrypt', 'string', ['string', 'string']);
  var str = x.elements[0].value;
  var key = x.elements[1].value;
  text += "key : "+key + "<br>";
  text += "str : "+str + "<br>";
  text += "Output encrypt :<br>" + encrypt(key, str) + "<br>";
  document.getElementById("demo").innerHTML = text;
  }
</script>

<br>
<h2>Decrypt Section</h2>
<form id="frm2">
  Input Text: <input type="text" name="fname" placeholder="Your input txt..."><br>
  Encryption Key : <input type="number" name="key" min="1" max="127" placeholder="4">
  <br><br>
</form> 


<p>Click "Decrypt" to encrypt your Message.</p>

<button onclick="myFunction2()">Decrypt</button>

<p id="demo2"></p>


<script>
  function myFunction2() {
  var x = document.getElementById("frm2");
  var text = "";
  decrypt= Module.cwrap('decrypt', 'string', ['string', 'string']);
  var str = x.elements[0].value;
  var key = x.elements[1].value;
  text += "key : "+key + "<br>";
  text += "str : "+str + "<br>";
  text += "Output encrypt :<br>" + decrypt(key, str) + "<br>";
  document.getElementById("demo2").innerHTML = text;
  }
</script>


</body>
